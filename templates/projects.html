{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<h1 class="mb-4">Our Projects</h1>

<div class="row">

{% for project in projects %}

<div class="col-md-4 mb-4">

<div class="card h-100 shadow">

{% if project.featured_image %}
<img src="{{ project.featured_image.url }}"
class="card-img-top">
{% endif %}

<div class="card-body">

<h4>{{ project.title }}</h4>

<p>{{ project.summary|truncatewords:20 }}</p>

<a href="{% url 'project_detail' project.slug %}"
class="btn btn-primary">
View Project
</a>

</div>

</div>

</div>

{% empty %}

<p>No projects have been published yet.</p>

{% endfor %}

</div>

</div>

{% endblock %}
